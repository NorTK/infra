---
- name: Create and configure local RPM repository for Linux Enterprise by NorTK
  hosts: all
  vars_files: vars/main.yaml

  tasks:
    - name: Install required tools (dnf, createrepo_c, nginx, rpm-build)
      ansible.builtin.dnf:
        name:
          - createrepo_c
          - nginx
          - libselinux-python3
          - rpm-build
        state: present

    - name: Create repository directory structure
      ansible.builtin.file:
        path: "{{ repo_base }}/{{ item.short_name }}"
        state: directory
        mode: '0755'
        owner: nginx
        group: nginx
      loop: "{{ repositories }}"

    - name: Initialize the repository with createrepo_c
      ansible.builtin.command:
        cmd: "createrepo_c {{ repo_base }}/{{ item.short_name }}"
        creates: "{{ repo_base }}/{{ item.short_name }}/repodata"
      loop: "{{ repositories }}"

    - name: Configure Nginx to serve the repository
      ansible.builtin.copy:
        dest: "/etc/nginx/conf.d/len_repos.conf"
        content: |
          server {
              listen 80;
              server_name {{ repo_fqdn }};
              root {{ repo_base }};
              location / {
                  autoindex on;
              }
          }
        mode: '0644'
      notify: Restart nginx

    - name: Configure Firewalld to allow HTTP traffic
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true

    - name: Set SELinux contexts for the web directory
      community.general.sefcontext:
        target: "{{ repo_base }}(/.*)?"
        setype: httpd_sys_content_t
        state: present

    - name: Apply new SELinux contexts (restorecon)
      ansible.builtin.command:
        cmd: "restorecon -Rv {{ repo_base }}"

    - name: Enable and start Nginx service
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

    - name: Generate update script
      ansible.builtin.template:
        src: templates/update_repos.sh.j2
        dest: "{{ repo_base }}/update_repos.sh"
        mode: '0755'

    - name: Create the Linux Enterprise release packages
      ansible.builtin.include_tasks: create_repo_rpm.yaml

  handlers:
    - name: Restart nginx
      ansible.builtin.systemd:
        name: nginx
        state: restarted
